name: mrce_test_app
description: ""

publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.38.0 <3.39.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  bloc: 9.2.0
  flutter_bloc: 9.1.1
  bloc_concurrency: ^0.3.0
  equatable: 2.0.8
  yandex_mapkit: ^4.2.1
  dio: 5.9.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^16.3.0
  flutter_dotenv: 6.0.0
  stream_transform: 2.1.1
  uuid: 4.5.2
  intl: 0.20.2
  flutter_svg: 2.2.1
  flutter_animate: 4.5.2

  talker_bloc_logger: ^5.1.9
  talker_dio_logger: ^5.1.9
  talker_flutter: 5.1.9
  provider: ^6.1.5+1
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

  flutter_gen_runner: 5.7.0

  intl_utils: 2.8.8
  mocktail: ^1.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - env/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true

