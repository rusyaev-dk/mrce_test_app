name: flutter_app_template
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.38.0 <3.39.0"

dependencies:
  flutter:
    sdk: flutter
  bloc: 9.2.0
  bloc_concurrency: ^0.3.0
  cupertino_icons: 1.0.8
  dio: 5.9.0
  equatable: 2.0.8
  flutter_animate: 4.5.2
  flutter_bloc: 9.1.1
  flutter_dotenv: 6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  flutter_svg: 2.2.1
  go_router: ^16.3.0
  intl: 0.20.2
  lottie: 3.3.1
  provider: 6.1.5
  shared_preferences: 2.5.4
  stream_transform: 2.1.1
  talker_bloc_logger: ^5.1.9
  talker_dio_logger: ^5.1.9
  talker_flutter: 5.1.9
  uuid: 4.5.2

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: 2.10.4
  flutter_lints: 6.0.0
  intl_utils: 2.8.13
  flutter_gen_runner: 5.12.0
  mocktail: ^1.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - env/
    - assets/icons/
    - assets/fonts/
    - assets/lottie/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400

flutter_gen:
  output: lib/gen/
  
  integrations:
    flutter_svg: true
    lottie: true

flutter_intl:
  enabled: true
  arb_dir: lib/l10n # Optional. Sets the directory of your ARB resource files. Provided value should be a valid path on your system. Default: lib/l10n
  output_dir: lib/gen/l10n # Optional. Sets the directory of generated localization files. Provided value should be a valid path on your system. Default: lib/generated
  main_locale: ru